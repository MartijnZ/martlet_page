<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>600% hogere afvoercapaciteit zonder zwaardere pomp | Martlet</title>
  <meta name="description" content="Casus: 600% hogere afvoercapaciteit zonder zwaardere pomp in industrieel machineontwerp.">
  <meta property="og:title" content="600% hogere afvoercapaciteit zonder zwaardere pomp | Martlet">
  <meta property="og:description" content="Casus: 600% hogere afvoercapaciteit zonder zwaardere pomp in industrieel machineontwerp.">
  <meta property="og:type" content="article">
  <meta property="og:locale" content="nl_NL">
  <meta property="og:url" content="/casussen/afvalafvoer-optimalisatie/">
  <link rel="icon" href="/favicon.svg" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="page" id="top">
  <header>
    <div class="container nav">
      <a class="brand" href="/" aria-label="Naar de homepage">
        <img src="/martlet_logo.png" alt="Martlet logo">
      </a>
      <nav class="nav-links">
        <a href="/over-martijn/">Over Martijn</a>
        <a href="/#diensten">Diensten</a>
        <a href="/casussen/">Casussen</a>
        <a href="/#contact">Plan een kennismaking</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="container case-header">
        <div class="section-title" aria-hidden="true"></div>
        <a class="btn btn-secondary case-back" href="/casussen/">Terug naar casussen</a>
        <h1 id="case-title">Casus</h1>
      </div>
    </section>

    <section class="case-detail">
      <div class="container">
        <div class="case-sections" id="case-sections"></div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <span>Martlet - Denken en doen voor de MKB maakindustrie.</span>
    </div>
  </footer>
  <script src="/cases-data.js"></script>
  <script>
    (function renderCaseDetail() {
      const slug = window.location.pathname.split("/").filter(Boolean).pop();
      const cases = window.MARTLET_CASES || [];
      const item = cases.find(entry => entry.slug === slug);
      const title = document.getElementById("case-title");
      const sections = document.getElementById("case-sections");

      if (!item) {
        if (title) title.textContent = "Casus niet gevonden";
        return;
      }

      if (title) title.textContent = item.title;
      if (item.tags && item.tags.length) {
        const tags = document.createElement("div");
        tags.className = "tag-group";
        item.tags.forEach(tagName => {
          const tag = document.createElement("span");
          tag.className = "tag";
          tag.textContent = tagName;
          tags.appendChild(tag);
        });
        title.insertAdjacentElement("beforebegin", tags);
      }
      const sectionOrder = [
        { key: "challenge", title: "De uitdaging", type: "text" },
        { key: "contribution", title: "Mijn bijdrage", type: "list" },
        { key: "results", title: "Resultaat", type: "list" },
        { key: "application", title: "Toepassing", type: "text" }
      ];

      sectionOrder.forEach(section => {
        const value = item[section.key];
        if (!value) return;

        const block = document.createElement("article");
        block.className = "case-section";

        const heading = document.createElement("h2");
        heading.textContent = section.title;
        block.appendChild(heading);

        if (section.type === "list") {
          const list = document.createElement("ul");
          value.forEach(point => {
            const li = document.createElement("li");
            li.textContent = point;
            list.appendChild(li);
          });
          block.appendChild(list);
        } else {
          const paragraph = document.createElement("p");
          paragraph.textContent = value;
          block.appendChild(paragraph);
        }

        sections.appendChild(block);
      });
    })();
  </script>
</body>
</html>
